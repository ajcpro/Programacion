name: Despliegue Automático Web y PDF

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal se llama así

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Instalar Pandoc (Para compilar el HTML)
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: 3. Configurar Node.js (Para generar el PDF)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. Instalar Pandoc y WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      - name: 5. Generar HTML y PDFs limpios
        run: |
          # Creamos la carpeta 'public' para la Web y 'public/pdf' para los PDFs
          mkdir -p public/pdf
          mkdir -p public/estilos
          
          # Copiamos tus estilos CSS a la carpeta pública para que la web se vea bien
          cp -r estilos/* public/estilos/ 2>/dev/null || true

          # Creamos los filtros Lua temporales
          cat << 'EOF' > tooltips.lua
          local note_count = 0
          function Note(elem)
            note_count = note_count + 1
            local texto = pandoc.utils.stringify(elem.content)
            local html = '<span class="tooltip"><span class="nota-llamada">[' .. note_count .. ']</span><span class="tooltiptext">' .. texto .. '</span></span>'
            return pandoc.RawInline('html', html)
          end
          EOF

          cat << 'EOF' > pdf_notas.lua
          function Note(elem)
            local texto = pandoc.utils.stringify(elem.content)
            local html = '<span class="nota-pie">' .. texto .. '</span>'
            return pandoc.RawInline('html', html)
          end
          EOF

          # Bucle de compilación
          for archivo in temas/*.md ejercicios/*.md problemas/*.md; do
            [ -e "$archivo" ] || continue
            nombre=$(basename "$archivo" .md)
            
            # 1. Generar el HTML final para la Web directamente en la carpeta 'public'
            pandoc "$archivo" --lua-filter=tooltips.lua -s -c estilos/estilo.css -c estilos/$nombre.css -o "public/$nombre.html"
            
            # 2. Generar un HTML temporal para el PDF
            pandoc "$archivo" --lua-filter=pdf_notas.lua -s -c estilos/estilo.css -c estilos/$nombre.css -o "temporal_impresion.html"
            
            # 3. Convertir ese HTML temporal a un PDF real con WeasyPrint
            weasyprint "temporal_impresion.html" "public/pdf/$nombre.pdf"
            
            # Limpiamos el temporal
            rm temporal_impresion.html
          done

          # Limpiamos los filtros para que no se queden en el repositorio
          rm tooltips.lua pdf_notas.lua

      - name: 6. Desplegar en GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public # <--- ¡ESTA ES LA CLAVE! Solo subirá el contenido de esta carpeta
          branch: gh_pages