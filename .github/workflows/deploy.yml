name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Instalar Pandoc
        run: sudo apt-get install -y pandoc

      - name: Instalar WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-cffi python3-brotli libpango-1.0-0 libpangoft2-1.0-0
          pip3 install WeasyPrint

      - name: Compilar archivos Markdown a HTML y PDF
        run: |
          # Creamos las carpetas base
          mkdir -p public/pdf
          mkdir -p public/estilos
          mkdir -p public/imagenes
          
          # Copiamos tus estilos e imágenes a la carpeta pública
          cp -r estilos/* public/estilos/ 2>/dev/null || true
          cp -r imagenes/* public/imagenes/ 2>/dev/null || true
          
          # Creamos los filtros Lua temporales
          cat << 'EOF' > tooltips.lua
          local note_count = 0
          function Note(elem)
            note_count = note_count + 1
            local texto = pandoc.utils.stringify(elem.content)
            local html = '<span class="tooltip"><span class="nota-llamada">[' .. note_count .. ']</span><span class="tooltiptext">' .. texto .. '</span></span>'
            return pandoc.RawInline('html', html)
          end
          EOF
          
          cat << 'EOF' > pdf_notas.lua
          function Note(elem)
            local texto = pandoc.utils.stringify(elem.content)
            local html = '<span class="nota-pie">' .. texto .. '</span>'
            return pandoc.RawInline('html', html)
          end
          EOF
          
          # 1. COMPILAR EL ÍNDICE PRINCIPAL
          if [ -e "index.md" ]; then
            pandoc index.md -s -c estilos/estilo.css -o public/index.html
          fi
          
          # 2. BUCLE DE COMPILACIÓN
          for archivo in temas/*.md ejercicios/*.md problemas/*.md; do
            [ -e "$archivo" ] || continue
            nombre=$(basename "$archivo" .md)
            directorio=$(dirname "$archivo")
            
            # Creamos la subcarpeta correspondiente
            mkdir -p "public/$directorio"
            
            # Generar el HTML
            pandoc "$archivo" --lua-filter=tooltips.lua -s -c ../estilos/estilo.css -c ../estilos/$nombre.css -o "public/$directorio/$nombre.html"
            
            # Generar el PDF
            pandoc "$archivo" --lua-filter=pdf_notas.lua -s -c estilos/estilo.css -c estilos/$nombre.css -o "temporal_impresion.html"
            weasyprint "temporal_impresion.html" "public/pdf/$nombre.pdf"
            rm temporal_impresion.html
          done
          
          rm tooltips.lua pdf_notas.lua

      - name: Desplegar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages