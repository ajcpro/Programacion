name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Instalar Pandoc
        run: sudo apt-get install -y pandoc

      - name: Instalar WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-cffi python3-brotli libpango-1.0-0 libpangoft2-1.0-0
          pip3 install WeasyPrint

      - name: Compilar archivos Markdown a HTML y PDF
        run: |
          mkdir -p public/pdf
          mkdir -p public/estilos
          mkdir -p public/imagenes

          # Copiamos tus estilos e imágenes a la carpeta pública
          cp -r estilos/* public/estilos/ 2>/dev/null || true
          cp -r imagenes/* public/imagenes/ 2>/dev/null || true

          # Creamos la plantilla HTML limpia que evita la duplicación de títulos y estilos de Pandoc
          cat << 'EOF' > template.html
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>$title$</title>
            $for(css)$
            <link rel="stylesheet" href="$css$">
            $endfor$
          </head>
          <body>
            $body$

            <!-- Script para abrir enlaces externos en una nueva pestaña -->
            <script>
            document.addEventListener("DOMContentLoaded", function() {
                var links = document.querySelectorAll('a');
                links.forEach(function(link) {
                    if (link.hostname && link.hostname !== location.hostname) {
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                    }
                });
            });
            </script>
          </body>
          </html>
          EOF

          # Creamos los filtros Lua optimizados
          cat << 'EOF' > tooltips.lua
          local notes = {}
          local note_count = 0

          function Note(elem)
            note_count = note_count + 1
            table.insert(notes, elem.content)
  
            -- Procesamos los bloques internos de la nota para mantener texto y saltos de línea <br>
            local inline_list = {}
            for i, block in ipairs(elem.content) do
              if block.content then
                for _, inline in ipairs(block.content) do
                  table.insert(inline_list, inline)
                end
                -- Si hay más bloques de texto dentro de la nota, metemos un salto de línea explícito
                if i < #elem.content then
                  table.insert(inline_list, pandoc.RawInline('html', '<br>'))
                end
              end
            end

            -- Extraemos el texto plano limpio de enlaces para el tooltiptext
            local texto = pandoc.utils.stringify(elem.content):gsub('"', '&quot;')
  
            -- Creamos un contenedor tooltip que envuelve a un enlace nativo funcional
            local html = '<span class="tooltip">' ..
               '<a href="#fn' .. note_count .. '" class="nota-llamada" id="fnref' .. note_count .. '">[' .. note_count .. ']</a>' ..
               '<span class="tooltiptext">' .. texto .. '</span>' ..
               '</span>'
            return pandoc.RawInline('html', html)
          end

          function Pandoc(doc)
            if #notes == 0 then return end
  
            -- Generamos manualmente la sección inferior de notas al pie
            local footnote_sec = pandoc.List({
              pandoc.HorizontalRule(),
              pandoc.Header(2, "Notas al pie", {id="sec-notas-pie"})
            })
  
            table.insert(footnote_sec, pandoc.RawBlock('html', '<ol class="seccion-notas-impresion">'))
  
            for i, content in ipairs(notes) do
              table.insert(footnote_sec, pandoc.RawBlock('html', '<li class="nota-pie" id="fn' .. i .. '">'))
    
              -- Añadimos un enlace de retorno al final de la nota
              local backlink = pandoc.RawInline('html', ' <a href="#fnref' .. i .. '" class="footnote-back">↩</a>')
              local last_block = content[#content]
              if last_block and last_block.t == "Para" then
                table.insert(last_block.content, backlink)
                footnote_sec:extend(content)
              else
                footnote_sec:extend(content)
                table.insert(footnote_sec, pandoc.Para({backlink}))
              end
    
              table.insert(footnote_sec, pandoc.RawBlock('html', '</li>'))
            end
  
            table.insert(footnote_sec, pandoc.RawBlock('html', '</ol>'))
            doc.blocks:extend(footnote_sec)
            return doc
          end
          EOF

          cat << 'EOF' > pdf_notas.lua
          function Note(elem)
          -- Envolvemos el contenido multilinea en un Span para el sistema de notas de WeasyPrint
            return pandoc.Span(pandoc.utils.blocks_to_inlines(elem.content), {class="nota-pie"})
          end

          function Image(elem)
            -- Sustituimos el "../imagenes/" inicial por "imagenes/"
            elem.src, nada = string.gsub(elem.src, ".*/imagenes/", "imagenes/")
            return elem
          end

          function Para(elem)
            -- Buscamos el párrafo de navegación y lo eliminamos del PDF por completo
            local texto = pandoc.utils.stringify(elem)
            if texto:find("Anterior") and texto:find("Inicio") and texto:find("Siguiente") then
              return {}
            end
          end
          EOF

          # 1. COMPILAR EL ÍNDICE PRINCIPAL
          if [ -e "index.md" ]; then
            pandoc index.md --template=template.html -c estilos/estilo.css -o public/index.html
          fi

          # 2. BUCLE DE COMPILACIÓN
          for archivo in temas/*.md ejercicios/*.md problemas/*.md; do
            [ -e "$archivo" ] || continue
            nombre=$(basename "$archivo" .md)
            directorio=$(dirname "$archivo")
   
            mkdir -p "public/$directorio"
   
            # Generar el HTML usando la nueva plantilla y filtros
            pandoc "$archivo" --template=template.html --lua-filter=tooltips.lua -c ../estilos/estilo.css -c ../estilos/$nombre.css -o "public/$directorio/$nombre.html"
   
            # Generar el PDF resolviendo imágenes, notas y eliminando la navegación anterior/siguiente
            pandoc "$archivo" --template=template.html --lua-filter=pdf_notas.lua -c estilos/estilo.css -c estilos/$nombre.css -o "temporal_impresion.html"
            cp "temporal_impresion.html" "public/pdf/$nombre.html"
            weasyprint "temporal_impresion.html" "public/pdf/$nombre.pdf"
            rm temporal_impresion.html
          done

          # Limpieza de temporales del entorno virtual
          rm tooltips.lua pdf_notas.lua template.html
          rm -rf imagenes

      - name: Desplegar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages